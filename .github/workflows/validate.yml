name: Validate

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'release/**'
      - 'fix/**'
      - 'docs/**'
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['24']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Lint docs
        run: npm run lint:docs

      - name: CLI help
        run: node dist/cli.js --help

      - name: CLI version
        run: node dist/cli.js --version

      - name: CLI smoke check
        run: npm run smoke:cli -- normal

      - name: CLI lifecycle smoke check
        run: npm run smoke:cli -- lifecycle

      - name: CLI extraction smoke check
        run: npm run smoke:cli -- extraction

      - name: CLI check smoke
        run: npm run smoke:cli -- check

      - name: CLI trace smoke
        run: npm run smoke:cli -- trace
